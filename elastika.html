<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ελαστικά | MotoJohn</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== Animations ===== */
    .slide-in-hidden {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .slide-in-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Layout για desktop ===== */
    main {
      display: grid;
      grid-template-columns: repeat(4, 200px);
      gap: 2rem;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .image-button {
      background: #fff;
      border: 3px solid #c4161c;
      border-radius: 16px;
      width: 200px;
      padding: 1.5rem 1rem;
      text-align: center;
      font-weight: bold;
      color: #c4161c;
      box-shadow: 0 5px 15px rgba(196,22,28,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.3s ease;
    }
    .image-button img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 1rem;
      border-radius: 10px;
    }
    .image-button:hover {
      background: #c4161c;
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(196,22,28,0.7);
    }

    /* ===== Mobile tweaks (≤480px) ===== */
    @media (max-width: 480px) {
      /* Hero */
      .accessory-hero {
        background-attachment: scroll !important;
        background-size: cover !important;
        background-position: center top !important;
        height: auto !important;
        padding: 2rem 1rem !important;
      }
      .accessory-hero-text h1 {
        font-size: 2rem !important;
        line-height: 1.2 !important;
      }
      .accessory-hero-text p {
        font-size: 1rem !important;
        margin-top: 0.5rem !important;
      }

      /* 2 στήλες grid */
      main {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 1rem !important;
        padding: 1rem !important;
      }
      .image-button {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/motojohn/" class="header-left">
      <img src="images/motojohn-logo.jpg" class="logo-icon" alt="Logo" />
      <div class="logo-text"><h1>Moto Repair Services</h1></div>
    </a>
    <nav class="header-nav">
      <a href="index.html">Αρχική</a>
      <a href="#services">Υπηρεσίες</a>
      <div class="dropdown">
        <a href="#" class="dropbtn active">Προϊόντα</a>
        <div class="dropdown-content">
          <a href="accessories.html">Αξεσουάρ</a>
          <a href="bikes.html">Ποδήλατα & Αξεσουάρ Ποδηλάτων</a>
          <a href="parts.html">Ανταλλακτικά & Ελαστικά</a>
          <a href="helmets.html">Κράνη</a>
        </div>
      </div>
      <a href="#contact">Επικοινωνία</a>
    </nav>
  </header>

  <section class="accessory-hero parts-hero">
    <div class="accessory-hero-overlay">
      <div class="accessory-hero-text">
        <h1>Ελαστικά</h1>
        <p>Διάλεξε ανάμεσα σε διάφορα ελαστικά για κάθε χρήση.</p>
      </div>
    </div>
  </section>

  <main>
    <a href="Λάστιχα.html" class="image-button slide-in-hidden">
      <img src="images/lastixa.jpeg" alt="Λάστιχα" />
      <span>Λάστιχα</span>
    </a>
    <a href="zantes.html" class="image-button slide-in-hidden">
      <img src="images/zantes.jpeg" alt="Ζάντες" />
      <span>Ζάντες</span>
    </a>
    <!-- Προσθέτεις κι άλλες κατηγορίες αν θες -->
  </main>

  <footer>
    <p><a href="parts.html">← Επιστροφή στα Ανταλλακτικά & Ελαστικά</a></p>
    <p>© 2025 MotoJohn</p>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('slide-in-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.slide-in-hidden')
            .forEach(el => observer.observe(el));
  </script>

</body>
</html>
